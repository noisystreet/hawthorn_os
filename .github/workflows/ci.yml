name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: typos
        uses: crate-ci/typos@v1.45.2

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-unknown-none

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings -W clippy::cognitive_complexity

      - name: test (workspace)
        run: cargo test --workspace

      - name: check (host)
        run: cargo check -p hawthorn_kernel

      - name: check (aarch64 bare metal)
        run: cargo check -p hawthorn_kernel --target aarch64-unknown-none

      - name: clippy (hawthorn_kernel, aarch64 bare-metal)
        run: cargo clippy -p hawthorn_kernel --features bare-metal --target aarch64-unknown-none -- -D warnings -W clippy::cognitive_complexity

      - name: build (hawthorn_kernel qemu virt)
        run: cargo build -p hawthorn_kernel --features bare-metal --target aarch64-unknown-none

      - name: install qemu test deps
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-arm socat

      - name: verify (hawthorn_kernel qemu virt serial)
        run: bash scripts/verify_kernel_qemu_virt_serial.sh

      - name: verify (hawthorn_kernel qemu virt EL0 serial)
        run: bash scripts/verify_kernel_qemu_virt_el0_serial.sh

      - name: clippy (qemu minimal, aarch64 bare-metal)
        run: cargo clippy -p hawthorn_qemu_minimal --features bare-metal --target aarch64-unknown-none -- -D warnings -W clippy::cognitive_complexity

      - name: build (qemu minimal bare-metal)
        run: cargo build -p hawthorn_qemu_minimal --features bare-metal --target aarch64-unknown-none
